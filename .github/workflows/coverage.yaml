name: Coverage

on:
  push:
    branches:
    - main
    - dev
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

env:
  PYTHON_VERSION: '3.10'

jobs:
  update-readme:
    name: Update README coverage
    runs-on: ubuntu-latest
    timeout-minutes: 15
    if: github.actor != 'github-actions[bot]'
    steps:
    - uses: actions/checkout@v6
      with:
        fetch-depth: 0
    - uses: ./.github/actions/setup-python-uv
      with:
        python-version: ${{ env.PYTHON_VERSION }}
    - name: Run coverage
      run: uv run --locked --extra dev tox run -e coverage
    - name: Update README coverage
      run: uv run --locked --extra dev python scripts/update_coverage_readme.py
    - name: Commit README coverage
      run: |
        if git diff --quiet -- README.md; then
          exit 0
        fi
        git config user.name "github-actions[bot]"
        git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
        git add README.md
        git commit -m "docs: update coverage result"
        git push
